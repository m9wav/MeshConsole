[Backend]
# Backend mode: meshtastic, meshcore, or dual
# Default: meshtastic (backward compatible)
# When absent, defaults to meshtastic for backward compatibility with v2.x configs.
mode = meshtastic

[Device]
# Connection type: "tcp" for network connection, "usb" for serial/USB connection
connection_type = tcp
# IP address of the Meshtastic device (used when connection_type = tcp)
ip = 192.168.1.100
# Serial port for USB connection (used when connection_type = usb)
# Leave empty for auto-detection, or specify like /dev/cu.usbserial-0001 or COM3
serial_port =

[MeshCore]
# MeshCore device configuration
# Used when mode = meshcore or dual
# Connection type: ble, usb, or tcp
connection_type = ble
# BLE address (for ble connection type)
ble_address =
# BLE PIN (optional, for secured devices)
ble_pin =
# Serial port (for usb connection type)
serial_port =
# TCP host (for tcp connection type)
tcp_host =
# TCP port (for tcp connection type)
tcp_port =

[Filter]
# Optional: Specific sender ID to filter messages (leave empty for no manual filtering)
# Note: Local node filtering is automatic
sender = 

[Web]
# Enable web server interface
enabled = true
# Web server host (use 127.0.0.1 for localhost only, 0.0.0.0 for all interfaces)
host = 127.0.0.1
# Web server port
port = 5055

[Logging]
# Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
level = INFO
# Log file name
file = meshtastic_tool.log
# Maximum log file size in MB
max_size = 10
# Number of backup log files to keep
backup_count = 5

[Database]
# Database file name
file = meshtastic_messages.db
# Maximum number of packets to keep in memory for web interface
max_packets_memory = 1000

# ── Multi-device configuration (v3.2.0) ─────────────────────
# To use multiple devices, add a [Devices] section with count
# and [Device.0], [Device.1], etc.  When present, [Device] and
# [MeshCore] sections above are ignored.
#
# [Devices]
# count = 3
#
# [Device.0]
# type = meshtastic
# connection_type = usb
# serial_port = /dev/ttyACM0
# device_id = mt-radio-1
#
# [Device.1]
# type = meshtastic
# connection_type = tcp
# ip = 192.168.1.101
# device_id = mt-radio-2
#
# [Device.2]
# type = meshcore
# connection_type = usb
# serial_port = /dev/ttyUSB0
# device_id = mc-radio-1

[Privacy]
# Hide direct messages from the main Live Packets feed
# Messages are still stored in the database and visible in the Messages tab
hide_dm_from_feed = false

[Security]
# Enable CORS for web interface (set to false for production)
cors_enabled = false
# Allowed origins for CORS (comma-separated)
cors_origins = http://localhost,http://127.0.0.1
# Authentication password for sensitive features (leave empty to disable auth)
# Sensitive features: send messages, traceroute
# CHANGE THIS! Leave empty to disable auth.
auth_password = changeme
# Session timeout in minutes
auth_timeout = 60
